<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* スムーズスクロール */
        html {
            scroll-behavior: smooth;
        }

        /* Navbarにコンテンツが隠れないようにする設定 */
        section {
            scroll-margin-top: 70px;
            min-height: 400px;
        }

        /* カレンダーの土日の色を設定するカスタムCSS */
        .table th:nth-child(1), .table td:nth-child(1) { color: red; }    /* 日曜日 */
        .table th:nth-child(7), .table td:nth-child(7) { color: blue; }   /* 土曜日 */
        .today { background-color: #e2f0d9 !important; font-weight: bold; } /* 今日 */

        /* カレンダーのセル調整 */
        .calendar-cell {
            cursor: pointer;
            position: relative;
            height: 60px;
            vertical-align: top;
        }
        .calendar-cell:hover {
            background-color: #f8f9fa;
        }
        .schedule-dot {
            font-size: 10px;
            color: #2ecc71;
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 目標管理アプリ用のスタイル */
        .goal-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        .hidden {
            display: none !important;
        }
        .custom-nav-link {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }
        .custom-nav-link:hover {
            text-decoration: underline;
        }
        /* 表示された目標のスタイル */
        .display-goal-box {
            background-color: #f8f9fa;
            border-left: 5px solid #2ecc71;
            padding: 15px;
            border-radius: 4px;
            text-align: left;
        }
        /* タイムラインスタイル */
        .timeline-item {
            border-left: 3px solid #3498db;
            padding-left: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-dark navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">My Website</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav me-auto gap-2">
                    <a class="nav-link" href="#calendar-section">Calendar</a>
                    <a class="nav-link" href="#goal-section">goal</a> 
                    <a class="nav-link" href="#gallery">Gallery</a>
                    <a class="nav-link" href="#contact">Contact</a>
                </div>
            </div>
        </div>
    </nav>

    <div id="home" class="container mt-5 pt-3 text-center">
        <h1>My Website</h1>
    </div>

    <section id="calendar-section" class="p-5 bg-white">
        <div class="container" style="max-width: 700px;">
            <h2 id="calendar-title" class="text-center mb-1">Calendar</h2>
            <div id="current-time" class="text-center text-muted mb-4 fs-5 fw-bold"></div>
            
            <table class="table table-bordered text-center">
                <thead class="table-dark">
                    <tr>
                        <th>日</th>
                        <th>月</th>
                        <th>火</th>
                        <th>水</th>
                        <th>木</th>
                        <th>金</th>
                        <th>土</th>
                    </tr>
                </thead>
                <tbody id="calendar-body">
                </tbody>
            </table>

            <div id="schedule-area" class="mt-4 p-4 border rounded bg-light d-none">
                <h4 id="selected-date-title" class="mb-3">選択された日付</h4>
                
                <h5>予定一覧</h5>
                <div id="schedule-list" class="mb-4"></div>

                <hr>

                <h5>予定を追加</h5>
                <form id="schedule-form" onsubmit="saveSchedule(event)">
                    <div class="row g-2 mb-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">時間</label>
                            <input type="time" id="schedule-time" class="form-control" required>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label small fw-bold">予定内容</label>
                            <input type="text" id="schedule-text" class="form-control" placeholder="例: ミーティング" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm">予定を保存</button>
                    <button type="button" class="btn btn-secondary btn-sm" onclick="closeScheduleArea()">閉じる</button>
                </form>
            </div>
        </div>
    </section>

    <section id="goal-section" class="p-5 bg-light border-top border-bottom">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12">
                    <div class="goal-container">
                        
                        <div id="main-screen">
                            <h2>今日の目標</h2>
                            <p class="text-muted">今日も目標に向かって頑張りましょう！</p>
                            
                            <div id="goal-display-area" class="my-4">
                            </div>

                            <hr>
                            <p class="mb-0">👉 <a class="custom-nav-link" onclick="showScreen('target-screen')">目標を設定・変更する</a></p>
                        </div>

                        <div id="target-screen" class="hidden">
                            <h2>目標設定</h2>
                            <p class="text-muted">あなたの新しい目標を入力してください。</p>
                            
                            <form id="goal-form" onsubmit="saveGoal(event)">
                                <div class="mb-3 text-start">
                                    <label for="goal-title" class="form-label fw-bold">目標タイトル</label>
                                    <input type="text" id="goal-title" class="form-control" placeholder="例: 毎朝30分読書をする" required>
                                </div>
                                <div class="mb-3 text-start">
                                    <label for="goal-detail" class="form-label fw-bold">具体的なアクション</label>
                                    <textarea id="goal-detail" class="form-control" rows="4" placeholder="例: 夜11時に寝て、朝6時に起きる"></textarea>
                                </div>
                                <button type="submit" class="btn btn-success w-100">目標を保存する</button>
                            </form>
                            
                            <hr>
                            <p class="mb-0">⬅️ <a class="custom-nav-link" onclick="showScreen('main-screen')">メイン画面に戻る</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="gallery" class="p-5 bg-white">
        <div class="container">
            <h2>Gallery</h2>
            <p>Gallery section</p>
        </div>
    </section>

    <section id="contact" class="p-5 bg-light">
        <div class="container">
            <h2>Contact</h2>
            <p>Contact section</p>
        </div>
    </section>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // グローバル変数で選択中の日付を管理
        let selectedDateStr = "";

        // --- カレンダー生成ロジック ---
        function createCalendar() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();

            document.getElementById('calendar-title').innerText = `${year}年 ${month + 1}月`;

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            const calendarBody = document.getElementById('calendar-body');
            calendarBody.innerHTML = '';

            let date = 1;
            for (let i = 0; i < 6; i++) {
                let row = document.createElement('tr');

                for (let j = 0; j < 7; j++) {
                    let cell = document.createElement('td');
                    cell.classList.add('calendar-cell');

                    if (i === 0 && j < firstDay) {
                        cell.innerText = '';
                    } else if (date > lastDate) {
                        cell.innerText = '';
                    } else {
                        cell.innerText = date;
                        
                        // YYYY-MM-DD 形式のキーを作成
                        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
                        cell.setAttribute('data-date', dateStr);

                        // クリックイベントの追加
                        cell.onclick = function() {
                            openScheduleArea(dateStr);
                        };

                        // 今日の日付ハイライト
                        if (date === now.getDate()) {
                            cell.classList.add('today');
                        }

                        // 予定がある場合はドットを表示
                        if (hasSchedule(dateStr)) {
                            const dot = document.createElement('div');
                            dot.classList.add('schedule-dot');
                            dot.innerText = '⚫';
                            cell.appendChild(dot);
                        }

                        date++;
                    }
                    row.appendChild(cell);
                }
                calendarBody.appendChild(row);

                if (date > lastDate) {
                    break;
                }
            }
        }

        // --- スケジュール管理ロジック ---
        
        // 指定した日に予定があるか確認
        function hasSchedule(dateStr) {
            const schedules = JSON.parse(localStorage.getItem('calendarSchedules') || '{}');
            return schedules[dateStr] && schedules[dateStr].length > 0;
        }

        // スケジュールエリアを開く
        function openScheduleArea(dateStr) {
            selectedDateStr = dateStr;
            const area = document.getElementById('schedule-area');
            area.classList.remove('d-none');
            
            // タイトルの日付を整形して表示
            const [y, m, d] = dateStr.split('-');
            document.getElementById('selected-date-title').innerText = `📅 ${parseInt(m)}月${parseInt(d)}日の予定`;
            
            displaySchedules();
        }

        // スケジュールエリアを閉じる
        function closeScheduleArea() {
            document.getElementById('schedule-area').classList.add('d-none');
        }

        // 予定一覧を表示する
        function displaySchedules() {
            const listContainer = document.getElementById('schedule-list');
            listContainer.innerHTML = '';

            const schedules = JSON.parse(localStorage.getItem('calendarSchedules') || '{}');
            const daySchedules = schedules[selectedDateStr] || [];

            if (daySchedules.length === 0) {
                listContainer.innerHTML = '<p class="text-muted small">予定はありません。</p>';
                return;
            }

            // 時間順にソート
            daySchedules.sort((a, b) => a.time.localeCompare(b.time));

            daySchedules.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.classList.add('timeline-item', 'd-flex', 'justify-content-between', 'align-items-center');
                itemDiv.innerHTML = `
                    <div>
                        <strong class="text-primary">${escapeHTML(item.time)}</strong> - <span>${escapeHTML(item.text)}</span>
                    </div>
                    <button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="deleteSchedule(${index})">削除</button>
                `;
                listContainer.appendChild(itemDiv);
            });
        }

        // 予定を保存する
        function saveSchedule(event) {
            event.preventDefault();
            const timeInput = document.getElementById('schedule-time');
            const textInput = document.getElementById('schedule-text');

            const schedules = JSON.parse(localStorage.getItem('calendarSchedules') || '{}');
            if (!schedules[selectedDateStr]) {
                schedules[selectedDateStr] = [];
            }

            schedules[selectedDateStr].push({
                time: timeInput.value,
                text: textInput.value
            });

            localStorage.setItem('calendarSchedules', JSON.stringify(schedules));

            // フォームのリセットと再描画
            textInput.value = '';
            timeInput.value = '';
            displaySchedules();
            createCalendar(); // カレンダーの⚫マークを更新するため再生成
        }

        // 予定を削除する
        function deleteSchedule(index) {
            if (!confirm('この予定を削除しますか？')) return;

            const schedules = JSON.parse(localStorage.getItem('calendarSchedules') || '{}');
            if (schedules[selectedDateStr]) {
                schedules[selectedDateStr].splice(index, 1);
                
                // 空になったら日付のキーごと削除
                if (schedules[selectedDateStr].length === 0) {
                    delete schedules[selectedDateStr];
                }
            }

            localStorage.setItem('calendarSchedules', JSON.stringify(schedules));
            displaySchedules();
            createCalendar(); // カレンダーの⚫マークを更新するため再生成
        }


        // --- リアルタイム時計ロジック ---
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('current-time').innerText = `現在時刻: ${hours}:${minutes}:${seconds}`;
        }

        // --- 目標管理画面切り替え＆データ処理ロジック ---
        function showScreen(screenId) {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('target-screen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');

            if (screenId === 'target-screen') {
                document.getElementById('goal-title').value = localStorage.getItem('userGoalTitle') || '';
                document.getElementById('goal-detail').value = localStorage.getItem('userGoalDetail') || '';
            }
        }

        function displayGoal() {
            const title = localStorage.getItem('userGoalTitle');
            const detail = localStorage.getItem('userGoalDetail');
            const displayArea = document.getElementById('goal-display-area');

            if (title) {
                displayArea.innerHTML = `
                    <div class="display-goal-box">
                        <h5 class="fw-bold text-success mb-1">🎯 現在の目標</h5>
                        <p class="fs-5 fw-bold mb-2">${escapeHTML(title)}</p>
                        ${detail ? `<p class="text-muted small mb-0" style="white-space: pre-wrap;">${escapeHTML(detail)}</p>` : ''}
                    </div>
                `;
            } else {
                displayArea.innerHTML = `
                    <div class="text-muted small p-3 border border-dashed rounded text-center">
                        まだ目標が設定されていません。
                    </div>
                `;
            }
        }

        function saveGoal(event) {
            event.preventDefault();

            const title = document.getElementById('goal-title').value;
            const detail = document.getElementById('goal-detail').value;

            localStorage.setItem('userGoalTitle', title);
            localStorage.setItem('userGoalDetail', detail);

            alert('目標を保存しました！');
            
            displayGoal();
            showScreen('main-screen');
        }

        // 安全にテキストを表示するためのエスケープ関数
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // --- ページ読み込み時の初期化 ---
        window.onload = function() {
            createCalendar();
            updateClock();
            setInterval(updateClock, 1000);
            displayGoal();
        };
    </script>
</body>
</html>
